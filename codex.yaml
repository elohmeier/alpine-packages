package:
  name: codex
  version: "0.118.0"
  epoch: 0
  description: "OpenAI Codex CLI - coding agent for the terminal"
  copyright:
    - license: Apache-2.0
  target-architecture:
    - x86_64
    - aarch64
  checks:
    disabled:
      - usrmerge

environment:
  contents:
    repositories:
      - https://dl-cdn.alpinelinux.org/alpine/edge/main
    keyring:
      - https://alpinelinux.org/keys/alpine-devel@lists.alpinelinux.org-4a6a0840.rsa.pub
    packages:
      - busybox
      - ca-certificates-bundle

pipeline:
  - runs: |
      # Download release binary
      wget -q "https://github.com/openai/codex/releases/download/rust-v${{package.version}}/codex-${{build.arch}}-unknown-linux-musl.tar.gz"

      # Verify checksum
      case "${{build.arch}}" in
        x86_64)
          EXPECTED_SHA256="e707ea65d7bbbc46a04afe731bf3c14a5b77522100cebf8bb93cffb95cf4610b"
          ;;
        aarch64)
          EXPECTED_SHA256="29bc741268b6d17ddd148b8c2c2108e8b3a0eef914b07922491348144e667e09"
          ;;
      esac
      echo "${EXPECTED_SHA256}  codex-${{build.arch}}-unknown-linux-musl.tar.gz" | sha256sum -c -

      # Extract and install
      tar -xzf "codex-${{build.arch}}-unknown-linux-musl.tar.gz"
      install -Dm755 "codex-${{build.arch}}-unknown-linux-musl" "${{targets.destdir}}/usr/bin/codex"

  - runs: |
      mkdir -p "${{targets.destdir}}/usr/share/licenses/codex"
      printf '%s\n' \
        'Copyright 2025 OpenAI' \
        'Licensed under the Apache License, Version 2.0' \
        'https://github.com/openai/codex/blob/main/LICENSE' \
        > "${{targets.destdir}}/usr/share/licenses/codex/LICENSE"

test:
  environment:
    contents:
      repositories:
        - https://dl-cdn.alpinelinux.org/alpine/edge/main
      keyring:
        - https://alpinelinux.org/keys/alpine-devel@lists.alpinelinux.org-4a6a0840.rsa.pub
  pipeline:
    - runs: |
        # Test that binary exists and is executable
        test -x /usr/bin/codex
    - runs: |
        # Test that codex --version works
        codex --version
    - runs: |
        # Test that codex --help works
        codex --help
